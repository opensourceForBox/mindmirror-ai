# MindMirror AI - Nginx 生产环境配置
# 反向代理 + 静态文件服务

server {
    listen 80;
    server_name 43.156.249.166;

    # ─── 前端静态文件 ─────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ─── 后端 API 代理 ───────────────────────────────────────
    location /api/ {
        proxy_pass http://app:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（AI 响应可能较慢）
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ─── WebSocket 代理（视频流分析） ─────────────────────────
    # 实际端点: /api/video/stream/{session_id}
    location /api/video/stream/ {
        proxy_pass http://app:8000/api/video/stream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 长连接超时
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ─── 健康检查端点 ─────────────────────────────────────────
    location /health {
        proxy_pass http://app:8000/health;
        proxy_set_header Host $host;
    }

    # ─── API 文档 ─────────────────────────────────────────────
    location /docs {
        proxy_pass http://app:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://app:8000/openapi.json;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://app:8000/redoc;
        proxy_set_header Host $host;
    }

    # ─── 安全头 ───────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── 文件上传大小限制（视频帧、图片上传） ───────────────────
    client_max_body_size 10M;

    # ─── Gzip 压缩 ────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ─── 静态资源缓存 ─────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── 禁止访问隐藏文件 ─────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
