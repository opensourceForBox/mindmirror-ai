# 生产环境 Docker Compose 配置
# 使用方法: docker-compose -f deploy/docker-compose.prod.yml up -d
# 注意: 所有路径相对于 deploy/ 目录（即 code/mindmirror/deploy/）

services:
  # ─── 前端构建 ───────────────────────────────────────────────
  frontend-builder:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
      - frontend_dist:/app/dist
    command: sh -c "npm install && npm run build"
    restart: "no"

  # ─── Nginx 反向代理 ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_healthy
      frontend-builder:
        condition: service_completed_successfully
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - mindmirror-net

  # ─── 后端应用 ────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 2
    expose:
      - "8000"
    env_file:
      - ../.env
    volumes:
      - ../knowledge_base:/app/knowledge_base
      - ../models:/app/models
      - ../configs:/app/configs
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - mindmirror-net

  # ─── Qdrant 向量数据库 ───────────────────────────────────────
  # 生产环境不暴露端口到外网，仅内部网络访问
  qdrant:
    image: qdrant/qdrant:latest
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.0\\r\\nhost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | head -1 | grep 200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - mindmirror-net

  # ─── Redis 缓存 ──────────────────────────────────────────────
  # 生产环境不暴露端口到外网，仅内部网络访问
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - mindmirror-net

volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  frontend_dist:
    driver: local

networks:
  mindmirror-net:
    driver: bridge
